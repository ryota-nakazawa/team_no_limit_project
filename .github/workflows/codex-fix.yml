# main への push でテストが落ちた時に Codex に最小修正を試させ、修正 PR を出す。
# プランの「推奨する流れ」と「GitHub Actions のイメージ」セクションに対応。
#
# 重要:
# - main へ直接 push しない。必ず別ブランチに切って Pull Request を作る。
# - 修正後はもう一度テストを回し、結果を PR 本文に書く。
# - 人間が diff を確認して merge する。
name: codex-fix-on-test-failure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  # 連続 push でも 1 本ずつ走らせる（PR ブランチが衝突しないように）。
  group: codex-fix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test
        continue-on-error: true
        # CRA (react-scripts test) は watch モードで止まるため CI=true が必須。
        env:
          CI: 'true'
        run: npm test -- --watchAll=false --passWithNoTests 2>&1 | tee /tmp/test-output.log

      - name: Run Codex if tests failed
        if: steps.test.outcome == 'failure'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          # 修正のためにファイル書き込みが必要。ネット越しの依存追加は許さない。
          sandbox: workspace-write
          prompt: |
            The test suite failed on branch ${{ github.ref_name }}
            after commit ${{ github.sha }} in ${{ github.repository }}.

            The full test output is at /tmp/test-output.log. Read it first.

            Your goal:
              1. Find the root cause.
              2. Make the smallest safe fix.
              3. Re-run only what is necessary to verify the fix.

            Hard constraints:
              - Make the smallest safe fix.
              - Do NOT change unrelated files.
              - Do NOT update dependencies (no edits to package.json /
                package-lock.json) unless the test failure is clearly caused
                by a missing or broken dependency.
              - Do NOT touch CI workflow files under .github/workflows/.
              - Prefer fixing source code over relaxing or deleting tests.
                Only modify a test if the test itself is provably wrong.

            After editing:
              - Summarize the changed files and why each change was needed.
              - List any risks or follow-ups.

            Save the summary to /tmp/codex-fix-summary.md.

      - name: Re-run tests
        if: steps.test.outcome == 'failure'
        id: retest
        continue-on-error: true
        env:
          CI: 'true'
        run: npm test -- --watchAll=false --passWithNoTests 2>&1 | tee /tmp/retest-output.log

      - name: Build PR body
        if: steps.test.outcome == 'failure'
        id: prbody
        run: |
          {
            echo "Codex attempted to fix failing tests after commit \`${{ github.sha }}\`."
            echo
            echo "**Initial test result:** failure"
            if [ "${{ steps.retest.outcome }}" = "success" ]; then
              echo "**Re-run after Codex fix:** ✅ passing"
            else
              echo "**Re-run after Codex fix:** ❌ still failing — review carefully before merging"
            fi
            echo
            echo "## Codex summary"
            echo
            if [ -s /tmp/codex-fix-summary.md ]; then
              cat /tmp/codex-fix-summary.md
            else
              echo "_(Codex did not produce a summary file.)_"
            fi
            echo
            echo "## Re-run output (tail)"
            echo
            echo '```'
            tail -n 80 /tmp/retest-output.log 2>/dev/null || echo "(no retest log)"
            echo '```'
            echo
            echo "---"
            echo "_Generated by \`codex-fix-on-test-failure\`. Please review the diff and CI result before merging._"
          } > /tmp/pr-body.md
          {
            echo 'pr_body<<__EOF__'
            cat /tmp/pr-body.md
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.test.outcome == 'failure'
        uses: peter-evans/create-pull-request@v7
        with:
          # ブランチ名に commit SHA を入れて衝突を避ける。
          branch: codex/fix-${{ github.sha }}
          base: main
          delete-branch: true
          commit-message: |
            Codex: attempt to fix failing tests on ${{ github.sha }}
          title: "Codex: fix failing tests (${{ github.sha }})"
          body: ${{ steps.prbody.outputs.pr_body }}
          labels: |
            codex
            automated
            needs-review

      - name: Mark job as failed if tests still failing
        if: steps.test.outcome == 'failure' && steps.retest.outcome != 'success'
        run: |
          echo "::error::Codex attempted a fix but tests still fail. See the opened PR."
          exit 1
